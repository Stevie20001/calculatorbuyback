<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Tagihan</title>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .card {
        background: white;
        padding: 30px;
        border-radius: 15px;
        width: 400px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        transition: 0.4s;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #1e3c72;
    }

    .input-group {
        margin-bottom: 15px;
    }

    label {
        font-size: 14px;
        font-weight: 600;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        border: none;
        border-radius: 10px;
        background: #1e3c72;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #163060;
    }

    .result {
        margin-top: 20px;
        background: #f3f6ff;
        padding: 15px;
        border-radius: 10px;
        display: none;
    }

    .result p {
        margin: 5px 0;
        font-size: 14px;
    }

    .total {
        font-weight: bold;
        font-size: 16px;
        color: #1e3c72;
        margin-top: 10px;
    }
</style>
</head>
<body>

<div class="card">
    <h2>Calculator Tagihan</h2>

    <div class="input-group">
        <label>Pokok Tagihan</label>
        <input type="number" id="pokok" placeholder="Masukkan Pokok">
    </div>

    <div class="input-group">
        <label>Bunga Berjalan</label>
        <input type="number" id="bunga" placeholder="Masukkan Bunga">
    </div>

    <div class="input-group">
        <label>Denda</label>
        <input type="number" id="denda" placeholder="Masukkan Denda">
    </div>

    <div class="input-group">
        <label>Denda Berjalan</label>
        <input type="number" id="dendaBerjalan" placeholder="Masukkan Denda Berjalan">
    </div>

    <div class="input-group">
        <label>Persentase Denda (%)</label>
        <input type="number" id="persenDenda" placeholder="Masukkan % Denda">
    </div>

    <button onclick="hitung()">Next</button>

    <div class="result" id="hasil">
        <p id="rincianPokok"></p>
        <p id="rincianBunga"></p>
        <p id="rincianDenda"></p>
        <p id="rincianDendaBerjalan"></p>
        <p id="rincianBiayaPokok"></p>
        <hr>
        <p class="total" id="total"></p>
    </div>
</div>

<script>
function formatRupiah(angka) {
    return new Intl.NumberFormat('id-ID', {
        style: 'currency',
        currency: 'IDR'
    }).format(angka);
}

function hitung() {
    let pokok = parseFloat(document.getElementById("pokok").value) || 0;
    let bunga = parseFloat(document.getElementById("bunga").value) || 0;
    let denda = parseFloat(document.getElementById("denda").value) || 0;
    let dendaBerjalan = parseFloat(document.getElementById("dendaBerjalan").value) || 0;
    let persenDenda = parseFloat(document.getElementById("persenDenda").value) || 0;

    let biayaPembayaranPokok = (persenDenda / 100) * pokok;

    let total = pokok + bunga + denda + dendaBerjalan + biayaPembayaranPokok;

    document.getElementById("rincianPokok").innerText = "Pokok Tagihan: " + formatRupiah(pokok);
    document.getElementById("rincianBunga").innerText = "Bunga Berjalan: " + formatRupiah(bunga);
    document.getElementById("rincianDenda").innerText = "Denda: " + formatRupiah(denda);
    document.getElementById("rincianDendaBerjalan").innerText = "Denda Berjalan: " + formatRupiah(dendaBerjalan);
    document.getElementById("rincianBiayaPokok").innerText = "Biaya Pembayaran Pokok (" + persenDenda + "%): " + formatRupiah(biayaPembayaranPokok);
    document.getElementById("total").innerText = "Total Kewajiban: " + formatRupiah(total);

    document.getElementById("hasil").style.display = "block";
}
</script>

</body>
</html>
